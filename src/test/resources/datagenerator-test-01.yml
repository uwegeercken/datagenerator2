--- # DataConfiguration - testfile_category.yml
name: Test
databaseName: /tmp/generateddata.duckdb
tableName: generateddata
fields:
  - name: gender
    values:
      - value: m
        weight: 40
      - value: f
        weight: 40
      - value: d
        weight: 20
  - name: weekday
    values:
      - value: Monday
        weight: 16
      - value: Tuesday
        weight: 16
      - value: Wednesday
        weight: 16
      - value: Thursday
        weight: 16
      - value: Friday
        weight: 16
      - value: Saturday
        weight: 10
      - value: Sunday
        weight: 10
    valuesFile: ./samples/categories/weekday.category
  - name: season
    valuesFile: ./samples/categories/season.category
    values:
      - value: Spring
        weight: 10
      - value: Summer
        weight: 70
      - value: Autumn
        weight: 10
      - value: Winter
        weight: 10
  - name: number
    values:
      - value: 0
        weight: 80
      - value: 1
        weight: 20
    transformations:
      - name: toLong

